services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ai-chatbot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-chatbot-backend
    ports:
      - "8000:8000"
    environment:
      APP_TITLE: RAG Chatbot API
      APP_DESCRIPTION: API for asking questions across contracts, research papers, and notes.
      APP_VERSION: 1.0.0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      RATE_LIMIT: 10/minute
      API_MEMORY_TURNS: 3
      CACHE_ENABLED: "true"
      CACHE_TTL_SECONDS: 300
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_chatbot
      DOCS_DIR: docs
      VECTORSTORE_DIR: vectorstore
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      RERANKER_MODEL_NAME: cross-encoder/ms-marco-MiniLM-L-6-v2
      LLM_MODEL_NAME: Qwen/Qwen3-4B-Instruct-2507
      LLM_MAX_NEW_TOKENS: 600
      CHUNK_SIZE: 400
      CHUNK_OVERLAP: 50
      RETRIEVAL_K: 12
      RETRIEVAL_FETCH_K: 20
      RERANK_TOP_N: 3
      ALLOW_DANGEROUS_DESERIALIZATION: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docs:/app/docs
      - ./vectorstore:/app/vectorstore
      - huggingface_cache:/app/.cache/huggingface

  postgres:
    image: postgres:16
    container_name: ai-chatbot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-chatbot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  huggingface_cache:
